name: QA Pipeline

on:
  push:
    branches: [master, feat/*]
  pull_request:
    branches: [master]

jobs:
  quality:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: web/.next

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=chromium
        env:
          BASE_URL: "http://localhost:3000"

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: web/test-results/

  accessibility:
    name: Accessibility Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npx playwright install chromium

      - name: Start server
        run: npm run build && npx next start &
        env:
          NODE_ENV: test

      - name: Run axe-core scan
        run: npx @axe-core/cli http://localhost:3000 --exit
